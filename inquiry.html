<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #eaf4fb;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* FORM BOX */
.form-box {
  background: #ffffff;
  padding: 28px 24px;
  border-radius: 18px;
  width: 340px;
  box-shadow: 0 12px 40px rgba(15,80,140,0.15);
}

.form-box h3 {
  margin-bottom: 18px;
  text-align: center;
  color: #1a4f7a;
}

/* INPUT GROUP */
.input-group {
  margin-bottom: 14px;
}

.input-group input,
.input-group textarea {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #d6e4f0;
  font-size: 14px;
  transition: 0.2s;
}

/* FOCUS EFFECT */
.input-group input:focus,
.input-group textarea:focus {
  border-color: #1a85cc;
  outline: none;
  box-shadow: 0 0 0 2px rgba(26,133,204,0.1);
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #1a85cc, #0e5fa0);
  color: white;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: 0.25s;
}

button:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 20px rgba(15,80,140,0.2);
}
</style>


<div class="form-box">
  <h3>Inquiry Form</h3>

  <form action="https://formsubmit.co/sanjivshah@yahoo.com" method="POST">

    <div class="input-group">
      <input type="text" name="name" placeholder="Full Name *" required>
    </div>

    <div class="input-group">
      <input type="tel" name="phone" placeholder="Phone Number *" required>
    </div>

    <div class="input-group">
      <input type="email" name="email" placeholder="Email Address (optional)">
    </div>

    <div class="input-group">
      <textarea name="message" rows="4" placeholder="Tell us your requirement... (optional)"></textarea>
    </div>

    <!-- Hidden -->
    <input type="hidden" name="_subject" value="New Inquiry from Digital Card">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_next" value="http://127.0.0.1:5500/thankyou.html">

    <button type="submit">Submit Inquiry</button>
  </form>
</div>
