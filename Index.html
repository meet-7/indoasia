<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #c8e6f5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 24px 0 48px;
    }

    .card {
      width: 360px;
      background: #ffffff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 12px 48px rgba(15, 80, 140, 0.18);
      text-align: center;
    }

    /* ── HEADER ── */
    .card-header {
      background: linear-gradient(155deg, #0e5fa0 0%, #1a85cc 100%);
      padding: 32px 25px 60px;
      position: relative;
    }

    .card-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='360' height='220' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='320' cy='30' r='80' fill='rgba(255,255,255,0.04)'/%3E%3Ccircle cx='40' cy='180' r='60' fill='rgba(255,255,255,0.04)'/%3E%3C/svg%3E") no-repeat center/cover;
      pointer-events: none;
    }

    .card-header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 52px;
      background: #ffffff;
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    }

    .logo {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.6);
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      color: #ffffff;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.5px;
      position: relative;
      z-index: 1;
    }

    .logo::before {
      content: "";
      position: absolute;
      width: 72%;
      height: 72%;
      background: #ffffff;
      border-radius: 14px;
      z-index: 0;
    }

    .logo img {
      width: 150%;
      height: 130%;
      object-fit: contain;
      border-radius: 12px;
      position: relative;
      z-index: 2;
    }

    .card-header h2 {
      margin: 0 0 4px;
      color: #ffffff;
      font-size: 22px;
      font-weight: 700;
      position: relative;
      z-index: 1;
      letter-spacing: 0.2px;
    }

    .role {
      font-size: 13.5px;
      color: rgba(255, 255, 255, 0.72);
      position: relative;
      z-index: 1;
    }

    .divider-line {
      width: 36px;
      height: 2px;
      background: rgba(255, 255, 255, 0.35);
      border-radius: 2px;
      margin: 10px auto;
      position: relative;
      z-index: 1;
    }

    .company {
      font-weight: 700;
      font-size: 15.5px;
      color: #ffffff;
      margin-top: 0;
      position: relative;
      z-index: 1;
      letter-spacing: 0.3px;
    }

    .highlight {
      margin-top: 13px;
      font-size: 12px;
      padding: 5px 14px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.18);
      color: #ffffff;
      display: inline-block;
      border: 1px solid rgba(255, 255, 255, 0.3);
      position: relative;
      z-index: 1;
      letter-spacing: 0.3px;
    }

    /* ── GRID ── */
    .card-body {
      background: #ffffff;
      padding: 4px 22px 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .item {
      text-align: center;
      text-decoration: none;
      color: inherit;
    }

    .circle {
      width: 68px;
      height: 68px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: auto;
      transition: 0.25s;
    }

    .c1 {
      background: #dbeeff;
    }

    .c2 {
      background: #d4f1e6;
    }

    .c3 {
      background: #e4edff;
    }

    .c4 {
      background: #d6f4fb;
    }

    .c5 {
      background: #fff3d6;
    }

    .c6 {
      background: #fde0f0;
    }

    .item:hover .circle {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(15, 80, 140, 0.15);
    }

    .circle svg {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    .label {
      margin-top: 8px;
      font-size: 12.5px;
      font-weight: 600;
      color: #2d4a6b;
    }

    /* ── FOOTER ── */
    .footer {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid #e0eefc;
      font-size: 12px;
      color: #6b8aaa;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .footer svg {
      width: 13px;
      height: 13px;
      opacity: 0.6;
    }

    .social-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-top: 12px
    }

    .social-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      text-decoration: none;
      padding: 7px 18px;
      border-radius: 20px;
      font-size: 12.5px;
      font-weight: 600;
      transition: 0.2s
    }

    .social-btn:hover {
      transform: translateY(-2px)
    }

    .social-ig {

    }

    .social-li {

      color: #0077b5
    }

      width: 16px;
      height: 16px;
      flex-shrink: 0
    }
  </style>
</head>
